<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notepad Pro</title>

  <!-- ✅ CORRECT CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- ✅ GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <h1>📝 Notepad Pro</h1>

    <div class="main">
      <div class="sidebar">
        <button class="new-btn" onclick="createNote()">+ New Note</button>
        <ul id="notesList"></ul>
      </div>

      <div class="editor">
        <input id="title" placeholder="Title">

        <select id="fontSelector" onchange="changeFont()">
          <option value="Inter">Inter</option>
          <option value="Arial">Arial</option>
          <option value="Courier New">Mono</option>
        </select>

        <textarea id="note"></textarea>

        <button onclick="deleteNote()">Delete</button>
      </div>
    </div>

  </div>

  <!-- ✅ FLOAT BUTTON -->
  <button id="floatBtn">🪟</button>

  <!-- ✅ FLOAT WINDOW -->
  <div id="floatWin">
    <div id="floatHeader">Quick Note</div>
    <textarea id="floatNote"></textarea>
  </div>

  <!-- ✅ CORRECT JS -->
  <script src="script.js"></script>

</body>
</html>
