<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad Pro</title>

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>

  <header class="app-toolbar">
    <div class="toolbar-left">
      <button class="brand-btn" id="menuBtn" title="Menu">
        <span class="brand-title">Notepad</span>
        <span class="arrow">⌄</span>
      </button>

      <button class="icon-btn" id="clearBtn" title="Clear">🗑</button>
      <button class="icon-btn" id="exportBtn" title="Download">⬇</button>
      <button class="icon-btn" id="copyBtn" title="Copy">📋</button>
      <button class="icon-btn" id="historyBtn" title="Save history">↶</button>
      <button class="icon-btn" id="themeBtn" title="Theme">🌙</button>
      <button class="icon-btn" id="timerBtn" title="Start / stop timer">⏱</button>
      <button class="icon-btn" id="shareBtn" title="Share">↗</button>
    </div>

    <div class="toolbar-right">
      <button class="icon-btn" id="previewBtn" title="Preview">▣</button>
      <button class="icon-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
      <button class="about-btn" id="aboutBtn">About</button>
    </div>
  </header>

  <div class="floating-tools">
    <button class="mini-btn" id="fontDownBtn" title="Smaller text">A-</button>
    <button class="mini-btn" id="fontUpBtn" title="Bigger text">A+</button>
    <button class="mini-btn" id="boldBtn" title="Bold"><strong>B</strong></button>
    <button class="mini-btn" id="italicBtn" title="Italic"><em>I</em></button>
    <button class="mini-btn" id="headingBtn" title="Heading">H</button>
  </div>

  <main class="editor-shell">
    <section class="editor-frame">
      <div
        id="note"
        contenteditable="true"
        spellcheck="true"
        data-placeholder="Start typing..."
      ></div>

      <div id="preview"></div>
    </section>
  </main>

  <footer class="bottom-status">
    <span class="pill timer-pill" id="timer">00:00</span>
    <span class="pill stats-pill" id="stats">0 characters, 0 words</span>
  </footer>

</body>
</html>
