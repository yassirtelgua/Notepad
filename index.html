<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yassir Notepad Pro</title>

  <!-- ✅ FIXED CSS LINK -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>📝 Notepad Pro</h1>

    <div class="top-bar">
      <input type="text" id="search" placeholder="Search notes...">
      <div>
        <button onclick="toggleTheme()">🌙/☀️</button>
        <button onclick="exportNotes()">📁 Export</button>
      </div>
    </div>

    <div class="main">

      <div class="sidebar">
        <button class="new-btn" onclick="createNote()">+ New Note</button>
        <ul id="notesList"></ul>
      </div>

      <div class="editor">
        <input id="title" placeholder="Note title...">
        <textarea id="note" placeholder="Start typing..."></textarea>

        <div class="bottom">
          <span id="saveStatus">Saved ✅</span>
          <span id="wordCount">0 words</span>
          <button onclick="deleteNote()">Delete</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ✅ FIXED JS LINK -->
  <script src="script.js"></script>

</body>
</html>
