<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notepad Pro</title>

  <!-- ✅ CORRECT CSS LINK -->
  <link rel="stylesheet" href="style.css">

  <!-- ✅ GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ✅ TOOLBAR -->
  <div class="toolbar">
    <span>📝 Notepad</span>

    <div>
      <button onclick="changeFontSize(-2)">A-</button>
      <button onclick="changeFontSize(2)">A+</button>
      <button onclick="togglePreview()">📄</button>
      <button onclick="clearNote()">🗑️</button>
    </div>
  </div>

  <!-- ✅ FLOAT TOOLBAR -->
  <div id="floatTools">
    <button onclick="formatText('**')">B</button>
    <button onclick="formatText('*')">I</button>
    <button onclick="formatText('# ')">H</button>
  </div>

  <!-- ✅ EDITOR -->
  <textarea id="note" placeholder="Start typing..."></textarea>

  <!-- ✅ PREVIEW -->
  <div id="preview"></div>

  <!-- ✅ FOOTER -->
  <div class="footer">
    <span id="stats">0 words</span>
    <span>Auto-save ✅</span>
  </div>

  <!-- ✅ CORRECT JS LINK -->
  <script src="script.js"></script>

</body>
</html>
