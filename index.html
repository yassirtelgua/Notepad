<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yassir Notepad Pro</title>

  <!-- ✅ Correct CSS link -->
  <link rel="stylesheet" href="style.css">

  <!-- ✅ Correct Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&family=Roboto&family=Playfair+Display&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">
    <h1>📝 Notepad Pro</h1>

    <div class="top-bar">
      <input type="text" id="search" placeholder="Search notes...">

      <div class="actions">
        <button onclick="toggleTheme()">🌙/☀️</button>
        <button onclick="changeFont()">🔤</button>
        <button onclick="exportNotes()">📁</button>
      </div>
    </div>

    <div class="main">

      <!-- Sidebar -->
      <div class="sidebar">
        <button class="new-btn" onclick="createNote()">+ New Note</button>
        <ul id="notesList"></ul>
      </div>

      <!-- Editor -->
      <div class="editor">
        <input id="title" placeholder="Note title...">
        <textarea id="note" placeholder="Start typing..."></textarea>

        <div class="bottom">
          <span id="saveStatus">Saved ✅</span>
          <span id="wordCount">0 words</span>
          <button onclick="deleteNote()">🗑️</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ✅ Correct JS link -->
  <script src="script.js"></script>

</body>
</html>
