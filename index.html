<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad Pro</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header class="toolbar">
    <div class="brand">
      <span class="logo">📝</span>
      <span>Notepad</span>
    </div>

    <div class="toolbar-actions">
      <button onclick="changeFontSize(-2)" title="Decrease font size">A-</button>
      <button onclick="changeFontSize(2)" title="Increase font size">A+</button>
      <button onclick="togglePreview()" title="Markdown preview">📄</button>
      <button onclick="saveHistory()" title="Save history">🕘</button>
      <button onclick="clearNote()" title="Clear note">🗑️</button>
    </div>
  </header>

  <div id="floatingToolbar">
    <button onclick="formatText('bold')" title="Bold">B</button>
    <button onclick="formatText('italic')" title="Italic">I</button>
    <button onclick="formatText('heading')" title="Heading">H</button>
  </div>

  <main class="editor-wrap">
    <textarea id="note" placeholder="Start typing..."></textarea>
    <div id="preview"></div>
  </main>

  <footer class="footer">
    <span id="timer">00:00</span>
    <span id="stats">0 characters, 0 words</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
