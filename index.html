<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notepad Pro</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- TOP BAR -->
  <div class="toolbar">
    <div class="left">
      <span class="title">Notepad</span>
    </div>

    <div class="right">
      <button onclick="deleteNote()">🗑️</button>
      <button onclick="exportNotes()">📥</button>
      <button onclick="toggleTimer()">⏱</button>
      <button onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <!-- MAIN EDITOR -->
  <textarea id="note" placeholder="Start typing..."></textarea>

  <!-- FOOTER -->
  <div class="footer">
    <div id="timer">00:00</div>
    <div id="stats">0 characters, 0 words</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
