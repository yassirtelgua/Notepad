<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yassir Notepad</title>
  style.css
</head>
<body>

  <div class="container">
    <h1>📝 Notepad</h1>

    <div class="status">
      <span id="saveStatus">Saved ✅</span>
      <span id="wordCount">0 words</span>
    </div>

    <textarea id="note" placeholder="Start typing..."></textarea>

    <div class="buttons">
      <button onclick="downloadNote()">Download</button>
      <button onclick="clearNote()">Clear</button>
    </div>
  </div>

  script.js
</body>
</html>
