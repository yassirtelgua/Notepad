<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad Pro</title>

  <!-- ✅ CSS LINK (IMPORTANT) -->
  <link rel="stylesheet" href="style.css">

  <!-- ✅ GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">
    <h1>📝 Notepad Pro</h1>

    <div class="main">

      <!-- Sidebar -->
      <div class="sidebar">
        <button class="new-btn" onclick="createNote()">+ New Note</button>
        <ul id="notesList"></ul>
      </div>

      <!-- Editor -->
      <div class="editor">
        <input id="title" placeholder="Note title..." />

        <select id="fontSelector" onchange="changeNoteFont()">
          <option value="Inter">Inter</option>
          <option value="Arial">Arial</option>
          <option value="Courier New">Mono</option>
        </select>

        <textarea id="note" placeholder="Start typing..."></textarea>

        <div class="bottom">
          <button onclick="deleteNote()">Delete</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ✅ FLOAT BUTTON -->
  <button id="floatBtn">+</button>

  <!-- ✅ FLOAT WINDOW -->
  <div id="floatWindow">
    <div id="floatHeader">Quick Note</div>
    <textarea id="floatNote" placeholder="Quick note..."></textarea>
  </div>

  <!-- ✅ JS SCRIPT (IMPORTANT) -->
  <script src="script.js"></script>

</body>
</html>
