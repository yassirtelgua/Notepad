<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yassir Notepad Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">
    <h1>📝 Notepad Pro</h1>

    <div class="top-bar">
      <input type="text" id="search" placeholder="Search notes...">
      <div>
        <button onclick="toggleTheme()">🌙/☀️</button>
        <button onclick="exportNotes()">📁 Export</button>
      </div>
    </div>

    <div class="main">

      <!-- Sidebar -->
      <div class="sidebar">
        <button class="new-btn" onclick="createNote()">+ New Note</button>
        <ul id="notesList"></ul>
      </div>

      <!-- Editor -->
      <div class="editor">
