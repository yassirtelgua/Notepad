<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad Pro</title>

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>

  <header class="app-toolbar">
    <div class="toolbar-left">

      <button class="brand-btn" id="menuBtn" title="Menu">
        <span class="brand-title">Notepad</span>
        <svg class="icon small-icon" viewBox="0 0 24 24">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </button>

      <button class="icon-btn" id="clearBtn" title="Clear note">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M3 6h18"></path>
          <path d="M8 6V4h8v2"></path>
          <path d="M19 6l-1 14H6L5 6"></path>
          <path d="M10 11v6"></path>
          <path d="M14 11v6"></path>
        </svg>
      </button>

      <button class="icon-btn" id="exportBtn" title="Download note">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M12 3v12"></path>
          <path d="M7 10l5 5 5-5"></path>
          <path d="M5 21h14"></path>
        </svg>
      </button>

      <button class="icon-btn" id="copyBtn" title="Copy note">
        <svg class="icon" viewBox="0 0 24 24">
          <rect x="9" y="9" width="11" height="11" rx="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </button>

      <button class="icon-btn" id="historyBtn" title="Save history">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M3 12a9 9 0 1 0 3-6.7"></path>
          <path d="M3 4v6h6"></path>
          <path d="M12 7v5l3 2"></path>
        </svg>
      </button>

      <button class="icon-btn" id="themeBtn" title="Theme">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path>
        </svg>
      </button>

      <button class="icon-btn" id="timerBtn" title="Start / stop timer">
        <svg class="icon" viewBox="0 0 24 24">
          <circle cx="12" cy="13" r="8"></circle>
          <path d="M12 9v5l3 2"></path>
          <path d="M9 2h6"></path>
        </svg>
      </button>

      <button class="icon-btn" id="shareBtn" title="Share">
        <svg class="icon" viewBox="0 0 24 24">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path d="M8.6 10.8l6.8-4.6"></path>
          <path d="M8.6 13.2l6.8 4.6"></path>
        </svg>
      </button>

    </div>

    <div class="toolbar-right">

      <button class="icon-btn" id="previewBtn" title="Preview">
        <svg class="icon" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="16" rx="2"></rect>
          <path d="M9 4v16"></path>
        </svg>
      </button>

      <button class="icon-btn" id="fullscreenBtn" title="Fullscreen">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M4 9V4h5"></path>
          <path d="M20 9V4h-5"></path>
          <path d="M4 15v5h5"></path>
          <path d="M20 15v5h-5"></path>
        </svg>
      </button>

      <button class="about-btn" id="aboutBtn">About</button>
    </div>
  </header>

  <div class="floating-tools">
    <button class="mini-btn" id="fontDownBtn" title="Smaller text">A-</button>
    <button class="mini-btn" id="fontUpBtn" title="Bigger text">A+</button>
    <button class="mini-btn" id="boldBtn" title="Bold"><strong>B</strong></button>
    <button class="mini-btn" id="italicBtn" title="Italic"><em>I</em></button>
    <button class="mini-btn" id="headingBtn" title="Heading">H</button>
  </div>

  <main class="editor-shell">
    <section class="editor-frame">
      <div
        id="note"
        contenteditable="true"
        spellcheck="true"
        data-placeholder="Start typing..."
      ></div>

      <div id="preview"></div>
    </section>
  </main>

  <footer class="bottom-status">
    <span class="pill timer-pill" id="timer">00:00</span>
    <span class="pill stats-pill" id="stats">0 characters, 0 words</span>
  </footer>

</body>
</html>
