<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yassir Notepad Pro</title>

  <!-- ✅ CSS -->
  style.css

  <!-- ✅ Google Fonts -->
  https://fonts.googleapis.com/css2?family=Inter&family=Roboto&family=Playfair+Display&display=swap
</head>

<body>

  <div class="container">
    <h1>📝 Notepad Pro</h1>

    <div class="top-bar">
      <input type="text" id="search" placeholder="Search notes...">

      <div class="actions">
        <button onclick="toggleTheme()">🌙</button>
        <button onclick="exportNotes()">📁</button>
      </div>
    </div>

    <div class="main">

      <div class="sidebar">
        <button class="new-btn" onclick="createNote()">+ New Note</button>
        <ul id="notesList"></ul>
      </div>

      <div class="editor">
        <input id="title" placeholder="Note title...">

        <select id="fontSelector" onchange="changeNoteFont()">
          <option value="Inter">Inter</option>
          <option value="Roboto">Roboto</option>
          <option value="Playfair Display">Playfair</option>
        </select>

        <textarea id="note" placeholder="Start typing..."></textarea>

        <div class="bottom">
          <span id="saveStatus">Saved ✅</span>
          <span id="wordCount">0 words</span>
          <button onclick="deleteNote()">🗑️</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ✅ FLOAT BUTTON -->
  <button id="floatingBtn">🪟</button>

  <!-- ✅ FLOAT WINDOW -->
  <div id="floatingWindow">
    <div id="floatingHeader">Floating Note ✏️</div>
    <textarea id="floatingNote" placeholder="Quick note..."></textarea>
  </div>

  <!-- ✅ JS -->
  script.js

</body>
</html>
